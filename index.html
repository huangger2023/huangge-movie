<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="荒哥说电影 - 专业影视解说教学，零基础入门，一对一答疑指导，全套剪辑素材">
    <meta name="keywords" content="影视解说,电影解说,视频剪辑,抖音教学,荒哥说电影">
    <meta name="author" content="荒哥说电影">
    <link rel="canonical" href="https://hgsdy.cn">
    <title>荒哥说电影 - 影视解说教学</title>
    <link rel="stylesheet" href="style.css">
    <!-- 51.la 访问统计（免费）- 替换成你自己的统计代码 -->
    <!-- <script charset="UTF-8" src="https://js.51.la/xxx.js"></script> -->
</head>
<body>
    <div class="container">
        <div class="card">
            <!-- 炸裂标题区 -->
            <div class="hero-section">
                <div class="fire-emoji">🔥</div>
                <h1 class="main-title">荒哥说电影</h1>
                <div class="subtitle-box">
                    <span class="badge">🎬 影视解说教学</span>
                </div>
                <p class="big-text">零基础小白也能学会！</p>
            </div>

            <!-- 双收款码区 -->
            <div class="qrcode-section">
                <div class="payment-codes">
                    <div class="payment-item">
                        <div class="qr-glow wechat-glow">
                            <img src="wechat-pay.jpg" alt="微信收款码" class="qrcode-img">
                        </div>
                        <span class="payment-label wechat-label">微信支付</span>
                    </div>
                    <div class="payment-item">
                        <div class="qr-glow alipay-glow">
                            <img src="alipay.jpg" alt="支付宝收款码" class="qrcode-img">
                        </div>
                        <span class="payment-label alipay-label">支付宝</span>
                    </div>
                </div>
                <div class="scan-tip">
                    <span class="pulse-dot"></span>
                    <strong>长按识别二维码 · 选择支付方式</strong>
                    <span class="pulse-dot"></span>
                </div>
            </div>

            <!-- 核心卖点 -->
            <div class="benefits">
                <div class="benefit-item">
                    <span class="icon">✅</span>
                    <span class="text">零基础入门 · 3天出作品</span>
                </div>
                <div class="benefit-item">
                    <span class="icon">✅</span>
                    <span class="text">远程一对一 · 包教包会</span>
                </div>
                <div class="benefit-item">
                    <span class="icon">✅</span>
                    <span class="text">内部交流群 · 随时答疑</span>
                </div>
                <div class="benefit-item">
                    <span class="icon">✅</span>
                    <span class="text">完整步骤录屏 · 反复学习</span>
                </div>
            </div>

            <!-- 紧迫感提示 -->
            <div class="urgency-box">
                <p class="urgency-text">成为正式学员前所有工具（不包含工具箱）都有试用</p>
            </div>

            <!-- 底部提示 -->
            <div class="footer-tip">
                <p>💬 添加时请备注：<strong class="red-text">抖音直播</strong></p>
                <p class="small-text">🎯 关注荒哥直播间，获取更多解说技巧</p>
            </div>
        </div>
    </div>

    <script>
        // 统计访问数据
        function recordVisit() {
            let stats = JSON.parse(localStorage.getItem('pageStats') || '{"visits":0}');
            stats.visits++;
            localStorage.setItem('pageStats', JSON.stringify(stats));
        }

        // 页面加载时记录访问
        recordVisit();

        // 查看统计数据（在控制台输入 showStats() 即可查看）
        function showStats() {
            const stats = JSON.parse(localStorage.getItem('pageStats') || '{"visits":0}');
            console.log('📊 访问统计：');
            console.log('   总访问量：' + stats.visits);
            return stats;
        }

        // 添加页面加载动画
        window.addEventListener('load', function() {
            document.querySelector('.card').classList.add('loaded');
        });
    </script>
</body>
</html>
